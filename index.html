<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Lap Timer</title>
    <!-- OpenCV.js loaded from CDN (avoids bundler node built-in issues and large file hosting) -->
    <script src="https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.12.0-release.1/dist/opencv.js"></script>
  </head>
  <body>
    <div id="app">
      <main class="container-fluid py-3">
        <h1 class="text-center mb-3 fs-3">RC Lap Timer</h1>

        <!-- Camera canvas -->
        <div class="card shadow-sm mb-3">
          <div class="card-header py-2 collapsible-header" data-bs-toggle="collapse" data-bs-target="#camera-body" aria-expanded="true">
            <span class="small fw-semibold">Camera</span>
          </div>
          <div id="camera-body" class="collapse show">
            <div class="card-body p-0 overflow-hidden rounded-bottom">
              <canvas id="canvas" class="w-100 d-block"></canvas>
            </div>
          </div>
        </div>

        <!-- HSV Helper (populated after user taps canvas) -->
        <div id="hsv-helper" class="card shadow-sm mb-3">
          <div class="card-header py-2 collapsible-header" data-bs-toggle="collapse" data-bs-target="#hsv-helper-body" aria-expanded="true">
            <span class="small fw-semibold">Drivers and Track</span>
          </div>
          <div id="hsv-helper-body" class="collapse show">
            <div class="card-body py-2 px-3">
              <div id="race-controls" class="d-flex align-items-center gap-2 mb-2">
                <label for="profile-select" class="mb-0 small fw-semibold text-end" style="flex:1 1 0;min-width:0">Profile:</label>
                <select id="profile-select" class="form-select form-select-sm" style="flex:1 1 0;min-width:0"></select>
                <button id="save-profile-btn" class="btn btn-sm btn-primary" style="flex:1 1 0;min-width:0">Save</button>
              </div>
              <div class="d-flex align-items-center gap-2 mb-2">
                <button id="add-profile-btn" class="btn btn-sm btn-outline-success flex-grow-1">New</button>
                <button id="copy-profile-btn" class="btn btn-sm btn-outline-primary flex-grow-1">Copy</button>
                <button id="delete-profile-btn" class="btn btn-sm btn-outline-danger flex-grow-1">Delete</button>
              </div>
              <div id="colours-list"></div>
              <div class="d-flex align-items-center gap-2 mt-2 mb-2">
                <button id="export-btn" class="btn btn-sm btn-outline-primary flex-grow-1">⬇ Export Profile</button>
                <label class="btn btn-sm btn-outline-secondary flex-grow-1 mb-0" for="import-file">⬆ Import Profile</label>
                <input type="file" id="import-file" accept=".json" class="d-none">
              </div>
              <p id="import-status" class="small text-muted mb-0 d-none"></p>
              <hr class="my-2">
              <p class="text-center text-muted small mb-1">Tap primary colour of the car in the camera to start adding a new driver</p>
              <div id="hsv-result" class="d-none">
                <div class="d-flex flex-wrap align-items-center justify-content-center gap-3">
                  <canvas id="hsv-swatch" width="48" height="48" class="rounded border flex-shrink-0"></canvas>
               <div class="font-monospace small lh-lg">
                    <div class="d-flex align-items-center gap-1"><span class="text-muted">H:</span>
                      <input type="number" id="hsv-h-min" class="form-control form-control-sm hsv-input" min="0" max="179">
                      <span>–</span>
                      <input type="number" id="hsv-h-max" class="form-control form-control-sm hsv-input" min="0" max="179">
                    </div>
                    <div class="d-flex align-items-center gap-1"><span class="text-muted">S:</span>
                      <input type="number" id="hsv-s-min" class="form-control form-control-sm hsv-input" min="0" max="255">
                      <span>–</span>
                      <input type="number" id="hsv-s-max" class="form-control form-control-sm hsv-input" min="0" max="255">
                    </div>
                    <div class="d-flex align-items-center gap-1"><span class="text-muted">V:</span>
                      <input type="number" id="hsv-v-min" class="form-control form-control-sm hsv-input" min="0" max="255">
                      <span>–</span>
                      <input type="number" id="hsv-v-max" class="form-control form-control-sm hsv-input" min="0" max="255">
                    </div>
                  </div>
                </div>
                <div class="mt-2">
                  <input type="text" id="hsv-name-input" class="form-control form-control-sm mb-2"
                         placeholder="Driver name…" maxlength="30">
                  <div class="d-flex align-items-center gap-2">
                    <button id="hsv-save-btn" class="btn btn-sm btn-outline-primary flex-grow-1">Add Driver</button>
                    <button id="hsv-hide-btn" class="btn btn-sm btn-outline-secondary flex-grow-1">Block Colour</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <button id="start-btn" class="btn btn-success btn-lg w-100 mb-3">▶ Start</button>

        <!-- Per-car columns (populated by JS) -->
        <div class="card shadow-sm mb-3">
          <div class="card-header py-2 collapsible-header" data-bs-toggle="collapse" data-bs-target="#cars-body" aria-expanded="true">
            <span class="small fw-semibold">Cars</span>
          </div>
          <div id="cars-body" class="collapse show">
            <div class="card-body py-2 px-3">
              <div id="cars-table" class="d-flex flex-wrap gap-2"></div>
            </div>
          </div>
        </div>

        <!-- Best Laps – Overall Top 10 -->
        <div class="card shadow-sm mb-3">
          <div class="card-header py-2 collapsible-header" data-bs-toggle="collapse" data-bs-target="#best-overall-body" aria-expanded="true">
            <span class="small fw-semibold">Best Laps – Top 10 Overall</span>
          </div>
          <div id="best-overall-body" class="collapse show">
            <div class="card-body py-2 px-3">
              <div id="best-overall-list"></div>
              <button id="clear-all-laps-btn" class="btn btn-sm btn-outline-danger w-100 mt-2">Clear All</button>
            </div>
          </div>
        </div>

        <!-- Best Laps – Per Driver Top 5 -->
        <div class="card shadow-sm mb-3">
          <div class="card-header py-2 collapsible-header" data-bs-toggle="collapse" data-bs-target="#best-driver-body" aria-expanded="true">
            <span class="small fw-semibold">Best Laps – Top 5 Per Driver</span>
          </div>
          <div id="best-driver-body" class="collapse show">
            <div class="card-body py-2 px-3">
              <div id="best-driver-list"></div>
            </div>
          </div>
        </div>

        <!-- Blocked HSV ranges (hidden until at least one is added) -->
        <div id="blocked-section" class="card shadow-sm mb-3 d-none">
          <div class="card-header py-2 collapsible-header small fw-semibold" data-bs-toggle="collapse" data-bs-target="#blocked-body" aria-expanded="true">
            <span>Blocked HSV Ranges</span>
          </div>
          <div id="blocked-body" class="collapse show">
            <div class="card-body py-2 px-3">
              <div id="blocked-list"></div>
            </div>
          </div>
        </div>

        <!-- Configuration -->
        <div class="card shadow-sm mb-3">
          <div class="card-header py-2 collapsible-header" data-bs-toggle="collapse" data-bs-target="#config-body" aria-expanded="false">
            <span class="small fw-semibold">Configuration</span>
          </div>
          <div id="config-body" class="collapse">
            <div class="card-body py-2 px-3">
              <div class="row g-2">
                <div class="col-3">
                  <label for="laps-input" class="form-label small mb-1">Laps</label>
                  <input type="number" id="laps-input" class="form-control form-control-sm"
                         min="1" max="99" value="3">
                </div>
                <div class="col-3">
                  <label for="cfg-min-area" class="form-label small mb-1">Min Detection (px²)</label>
                  <input type="number" id="cfg-min-area" class="form-control form-control-sm"
                         min="1" value="6000">
                </div>
                <div class="col-3">
                  <label for="cfg-cooldown" class="form-label small mb-1">Cooldown (ms)</label>
                  <input type="number" id="cfg-cooldown" class="form-control form-control-sm"
                         min="0" step="100" value="5000">
                </div>
                <div class="col-3">
                  <label for="cfg-hsv-size" class="form-label small mb-1">HSV Size (px)</label>
                  <input type="number" id="cfg-hsv-size" class="form-control form-control-sm"
                         min="1" max="200" value="50">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Status message -->
        <p id="status" class="text-center text-muted mt-1 small mb-0">Initializing…</p>
      </main>
    </div>

    <!-- Hidden video element used to capture the camera feed -->
    <video id="video" autoplay playsinline muted style="display:none;"></video>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
